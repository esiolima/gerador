<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Cupom de Desconto</title>

<style>
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Regular.ttf') format('truetype');
  font-weight: 400;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Bold.ttf') format('truetype');
  font-weight: 700;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Black.ttf') format('truetype');
  font-weight: 900;
}

* {
  box-sizing: border-box;
  font-family: Inter, sans-serif;
  text-transform: uppercase;
}

body {
  margin: 0;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 700px;
  height: 1057.5px;
  border: 6px solid #F2C94C;
  border-radius: 48px;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px;
  position: relative;
  color: #1F3C6E;
  overflow: hidden;
}

/* ===== SELO ===== */
.selo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 117px;
  height: 58.5px;
  z-index: 99999;
  pointer-events: none;
}

.selo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.selo img[src=""] {
  display: none;
}

/* ===== LOGO ===== */
.logo {
  margin-top: 45px;
  height: 114px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.logo img {
  max-height: 114px;
  max-width: 336px;
  object-fit: contain;
  display: block;
}

.logo img[src=""],
.logo img:not([src]) {
  display: none;
}

/* ===== TARJA ===== */
.tarja {
  background: #16A7E0;
  color: #ffffff;
  font-weight: 700;
  font-size: 42px;
  text-align: center;
  padding: 18px 40px;
  border-radius: 999px;
  margin-top: 10px;
  margin-bottom: 20px;
  white-space: nowrap;
}

/* ===== TEXTO ===== */
.condicao {
  margin-top: 0;
  margin-bottom: 15px;
  max-width: 550px;
  font-size: 28px;
  line-height: 1.15;
  text-align: center;
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== BENEFÍCIO ===== */
.percentual {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  width: 100%;
  margin-top: 10px;
}

.numero,
.percent {
  font-weight: 900;
  font-size: clamp(120px, 25vw, 270px);
  line-height: 0.85;
}

.percent {
  margin-left: 6px;
}

.desconto {
  margin-top: 5px;
  font-size: clamp(40px, 5vw, 60px);
  font-weight: 700;
}

/* ===== FLEX ===== */
.espaco-flexivel {
  margin-top: 15px;
  margin-bottom: 15px;
  text-align: center;
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.complemento {
  font-size: 22px;
  line-height: 1.2;
  margin-bottom: 5px;
}

.legal {
  font-size: 16px;
  opacity: 0.8;
}

/* ===== CUPOM BOX ===== */
.cupom-box {
  margin-top: 10px;
  margin-bottom: 20px;
  width: 620px;
  height: 110px;
  background: #16A7E0;
  border-radius: 16px;
  display: flex;
  overflow: hidden;
}

/* LADO ESQUERDO */
.cupom-label {
  width: 80px;
  background: rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.cupom-label span {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-size: 22px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 2px;
}

/* CÓDIGO */
.cupom-codigo {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-left: 45px;
  padding-right: 45px;
  overflow: hidden;
  text-align: center;
}

/* TEXTO DO CUPOM */
#cupom-text {
  display: block;
  max-width: 100%;
  font-weight: 900;
  color: #ffffff;
  font-size: 72px;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
}

/* ===== RODAPÉ ===== */
.rodape {
  margin-bottom: 35px;
  text-align: center;
  width: 100%;
}

.uf {
  font-size: 22px;
  font-weight: 700;
}

.segmento {
  margin-top: 8px;
  font-size: 18px;
}
</style>
</head>

<body>
<div class="card">

  <div class="selo">
    <img src="{{SELO}}" alt="Selo">
  </div>

  <div class="logo">
    <img src="{{LOGO}}" alt="Logo">
  </div>

  <div class="tarja">
    CUPOM DE DESCONTO
  </div>

  <div class="condicao">{{TEXTO}}</div>

  <div class="percentual">
    <div class="numero">{{VALOR}}</div>
    <div class="percent">%</div>
  </div>

  <div class="desconto">DE DESCONTO</div>

  <div class="espaco-flexivel">
    <div class="complemento">{{COMPLEMENTO}}</div>
    <div class="legal">{{LEGAL}}</div>
  </div>

  <div class="cupom-box">
    <div class="cupom-label">
      <span>CUPOM</span>
    </div>

    <div class="cupom-codigo">
      <span id="cupom-text">{{CUPOM}}</span>
    </div>
  </div>

  <div class="rodape">
    <div class="uf">{{URN}}</div>
    <div class="uf">{{UF}}</div>
    <div class="segmento" id="segmento-bloco">
      NEGÓCIO DE CLIENTES: {{SEGMENTO}}
    </div>
  </div>

</div>

<script>
window.addEventListener("load", function () {
  try {
    const el = document.getElementById("cupom-text");

    if (el && el.parentElement) {
      const container = el.parentElement;
      let fontSize = 72;
      const min = 20;
      let tentativas = 0;
      const maxTentativas = 80;

      el.style.fontSize = fontSize + "px";
      el.style.whiteSpace = "nowrap";

      function getAvailableWidth() {
        const styles = window.getComputedStyle(container);
        const paddingLeft = parseFloat(styles.paddingLeft) || 0;
        const paddingRight = parseFloat(styles.paddingRight) || 0;
        const width = container.clientWidth - paddingLeft - paddingRight;

        return Math.max(width, 50);
      }

      const availableWidth = getAvailableWidth();

      while (
        el.scrollWidth > availableWidth &&
        fontSize > min &&
        tentativas < maxTentativas
      ) {
        fontSize -= 1;
        el.style.fontSize = fontSize + "px";
        tentativas += 1;
      }
    }

    const segmento = document.getElementById("segmento-bloco");

    if (segmento) {
      const texto = (segmento.textContent || "").trim();

      if (
        !texto ||
        texto === "NEGÓCIO DE CLIENTES:" ||
        texto.includes("{{SEGMENTO}}")
      ) {
        segmento.style.display = "none";
      }
    }
  } catch (error) {
    console.error("[cupom.html] erro no ajuste visual:", error);
  }
});
</script>

</body>
</html>
