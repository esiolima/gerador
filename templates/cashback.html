<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=700, initial-scale=1.0" />
<title>Cashback</title>

<style>
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Regular.ttf') format('truetype');
  font-weight: 400;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Bold.ttf') format('truetype');
  font-weight: 700;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Black.ttf') format('truetype');
  font-weight: 900;
}

* {
  box-sizing: border-box;
  text-transform: uppercase;
  font-family: 'Inter', sans-serif;
  color: #1F3C6E;
}

body {
  margin: 0;
  width: 700px;
  height: 1058px;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 700px;
  height: 1058px;
  border: 8px solid #e0b84b;
  border-radius: 40px;
  background: #ffffff;
  padding: 55px 40px 38px 40px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
  position: relative;
}

/* ===== SELO DINÂMICO ===== */
.selo {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 130px;
  height: 65px;
  background: transparent;
  display: none;
  z-index: 999;
}

.selo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* ===== TOPO ===== */
.topo {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  width: 100%;
  height: 140px;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.logo img {
  max-width: 280px;
  max-height: 140px;
  object-fit: contain;
}

.logo img[src=""] {
  display: none;
}

.logo:has(img[src=""])::before,
.logo:not(:has(img))::before {
  content: "CLIQUE PARA ADICIONAR LOGO";
  font-size: 18px;
  color: #999;
  border: 2px dashed #ccc;
  padding: 20px 40px;
  border-radius: 12px;
}

.tarja {
  background: #d200da;
  color: #ffffff;
  font-weight: 700;
  font-size: 42px;
  text-align: center;
  padding: 18px 40px;
  border-radius: 999px;
  margin-bottom: 22px;
  white-space: nowrap;
}

/* ===== BLOCO CENTRAL ===== */
.area-central {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.texto-topo {
  font-size: 26px;
  line-height: 1.18;
  max-width: 560px;
  text-align: center;
  word-break: break-word;
}

/* ===== VALOR GRANDE + AUTO AJUSTE ===== */
.valor-container {
  width: 100%;
  height: 245px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.valor-texto {
  font-weight: 900;
  font-size: 270px;
  line-height: 0.9;
  white-space: nowrap;
  text-align: center;
  display: inline-block;
}

.desconto {
  font-size: 46px;
  font-weight: 700;
  line-height: 1;
}

.complemento {
  font-size: 24px;
  line-height: 1.15;
  max-width: 560px;
  text-align: center;
  word-break: break-word;
}

.legal {
  font-size: 18px;
  line-height: 1.15;
  max-width: 560px;
  text-align: center;
  word-break: break-word;
}

/* ===== RODAPÉ ===== */
.rodape {
  text-align: center;
  margin-bottom: 8px;
}

.uf {
  font-size: 22px;
  font-weight: 700;
}

.segmento-wrapper {
  margin-top: 12px;
  font-size: 18px;
  font-weight: 400;
}
</style>
</head>

<body>

<div class="card">

  <div class="selo" id="selo-container">
    <img id="selo-img" alt="Selo" />
  </div>

  <div class="topo">
    <div class="logo">
      <img src="{{LOGO}}" alt="Logo" />
    </div>

    <div class="tarja">
      CASHBACK
    </div>
  </div>

  <div class="area-central">

    <div class="texto-topo">
      {{TEXTO}}
    </div>

    <div class="valor-container" id="valor-container">
      <div class="valor-texto" id="valor-texto">
        {{VALOR}}%
      </div>
    </div>

    <div class="desconto">
      DE DESCONTO
    </div>

    <div class="complemento">
      {{COMPLEMENTO}}
    </div>

    <div class="legal">
      {{LEGAL}}
    </div>

  </div>

  <div class="rodape">
    <div class="uf">{{URN}}</div>
    <div class="uf">{{UF}}</div>

    <div class="segmento-wrapper" id="segmento-bloco">
      NEGOCIO DE CLIENTES: {{SEGMENTO}}
    </div>
  </div>

</div>

<script>
window.addEventListener("load", function () {

  const container = document.getElementById("valor-container");
  const valor = document.getElementById("valor-texto");

  if (container && valor) {
    let fontSize = 270;
    const minFontSize = 90;

    valor.style.fontSize = fontSize + "px";
    valor.style.whiteSpace = "nowrap";

    while (
      (valor.scrollWidth > container.clientWidth ||
       valor.scrollHeight > container.clientHeight) &&
      fontSize > minFontSize
    ) {
      fontSize -= 2;
      valor.style.fontSize = fontSize + "px";
    }
  }

  const segmento = document.getElementById("segmento-bloco");
  const valorSegmento = "{{SEGMENTO}}".trim();

  if (!valorSegmento && segmento) {
    segmento.style.display = "none";
  }

  const seloContainer = document.getElementById("selo-container");
  const seloImg = document.getElementById("selo-img");
  const valorSelo = "{{SELO}}".trim();

  if (valorSelo && seloContainer && seloImg) {
    seloImg.src = valorSelo;
    seloContainer.style.display = "block";
  }

});
</script>

</body>
</html>
