<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=700, initial-scale=1.0" />
<title>Promoção</title>

<style>
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Regular.ttf') format('truetype');
  font-weight: 400;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Bold.ttf') format('truetype');
  font-weight: 700;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Black.ttf') format('truetype');
  font-weight: 900;
}

* {
  text-transform: uppercase;
  color: #2b4474;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  margin: 0;
  width: 700px;
  height: 1058px;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 700px;
  height: 1058px;
  border: 8px solid #e0b84b;
  border-radius: 40px;
  padding: 60px 40px 38px 40px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #ffffff;
  overflow: hidden;
  position: relative;
}

/* ===== SELO ===== */
.selo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 117px;
  height: 58.5px;
  background: transparent;
  z-index: 99999;
  pointer-events: none;
}

.selo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.selo img[src=""] {
  display: none;
}

/* ===== TOPO ===== */
.topo {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  width: 100%;
  height: 130px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.logo img {
  max-width: 260px;
  max-height: 130px;
  object-fit: contain;
}

.logo img[src=""] {
  display: none;
}

.logo:has(img[src=""])::before,
.logo:not(:has(img))::before {
  content: "CLIQUE PARA ADICIONAR LOGO";
  font-size: 18px;
  color: #999;
  border: 2px dashed #ccc;
  padding: 20px 40px;
  border-radius: 12px;
}

.tarja {
  background: #ff7a00;
  color: #ffffff;
  padding: 18px 70px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 52px;
  text-align: center;
  white-space: nowrap;
}

/* ===== BLOCO CENTRAL ===== */
.bloco-central {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.texto-topo {
  text-align: center;
  font-size: 28px;
  max-width: 550px;
  line-height: 1.15;
  margin: 24px 0 16px;
  word-break: break-word;
}

.valor-container {
  width: 100%;
  height: 360px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.valor-texto {
  font-weight: 900;
  font-size: 480px;
  text-align: center;
  white-space: normal;
  word-break: keep-all;
  overflow-wrap: normal;
  line-height: 0.9;
}

/* ===== INFERIOR ===== */
.bloco-inferior {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.complemento {
  text-align: center;
  font-size: 22px;
  max-width: 550px;
  line-height: 1.15;
  word-break: break-word;
}

.legal {
  margin-top: 10px;
  text-align: center;
  font-size: 18px;
  max-width: 550px;
  line-height: 1.15;
  word-break: break-word;
}

.rodape {
  margin-top: 18px;
  text-align: center;
}

.uf {
  font-size: 22px;
  font-weight: 700;
}

.segmento-wrapper {
  margin-top: 10px;
  font-size: 18px;
  font-weight: 400;
}
</style>
</head>

<body>

<div class="card">

  <div class="selo">
    <img src="{{SELO}}" alt="Selo" />
  </div>

  <div class="topo">
    <div class="logo">
      <img src="{{LOGO}}" alt="Logo" />
    </div>

    <div class="tarja">PROMOÇÃO</div>
  </div>

  <div class="bloco-central">
    <div class="texto-topo">{{TEXTO}}</div>

    <div class="valor-container" id="valor-container">
      <div class="valor-texto" id="valor-texto">
        {{VALOR}}
      </div>
    </div>
  </div>

  <div class="bloco-inferior">
    <div class="complemento">{{COMPLEMENTO}}</div>
    <div class="legal">{{LEGAL}}</div>

    <div class="rodape">
      <div class="uf">{{URN}}</div>
      <div class="uf">{{UF}}</div>

      <div class="segmento-wrapper" id="segmento-bloco">
        NEGÓCIO DE CLIENTES: {{SEGMENTO}}
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  const container = document.getElementById("valor-container");
  const el = document.getElementById("valor-texto");

  if (container && el) {
    let fontSize = 480;
    const min = 40;

    el.style.fontSize = fontSize + "px";
    el.style.whiteSpace = "normal";
    el.style.wordBreak = "keep-all";
    el.style.overflowWrap = "normal";

    while (
      (el.scrollHeight > container.clientHeight ||
       el.scrollWidth > container.clientWidth) &&
      fontSize > min
    ) {
      fontSize -= 2;
      el.style.fontSize = fontSize + "px";
    }
  }

  const segmento = document.getElementById("segmento-bloco");

  if (segmento) {
    const texto = segmento.textContent ? segmento.textContent.trim() : "";

    if (!texto || texto === "NEGÓCIO DE CLIENTES:") {
      segmento.style.display = "none";
    }
  }
})();
</script>

</body>
</html>
