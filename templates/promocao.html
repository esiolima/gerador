<!-- templates/promocao.html CORRIGIDO -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=700, initial-scale=1.0" />
<title>Promoção</title>

<style>
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Regular.ttf');
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Bold.ttf');
  font-weight: 700;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Black.ttf');
  font-weight: 900;
}

* {
  text-transform: uppercase;
  color: #2b4474;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  margin: 0;
  width: 700px;
  height: 1058px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.card {
  width: 700px;
  height: 1058px;
  border: 8px solid #e0b84b;
  border-radius: 40px;
  padding: 70px 40px 40px 40px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #fff;
  overflow: hidden;
}

/* TOPO */
.topo {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo img {
  max-width: 220px;
  max-height: 120px;
}

.tarja {
  background: #ff7a00;
  color: #fff;
  padding: 20px 70px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 54px;
}

/* TEXTO */
.texto-topo {
  text-align: center;
  font-size: 28px;
  max-width: 550px;
  margin: 25px 0 20px;
}

/* VALOR */
.valor-container {
  width: 100%;
  height: 360px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.valor-texto {
  font-weight: 900;
  font-size: 480px;
  text-align: center;

  white-space: normal;      /* permite quebrar linha */
  word-break: keep-all;     /* nunca quebra palavra */
  overflow-wrap: normal;

  line-height: 0.9;
}

/* INFERIOR */
.complemento {
  text-align: center;
  font-size: 22px;
  max-width: 550px;
}

.legal {
  text-align: center;
  font-size: 18px;
  max-width: 550px;
}

.rodape {
  text-align: center;
}

.segmento-wrapper {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="card">

  <div class="topo">
    <div class="logo">
      <img src="{{LOGO}}">
    </div>

    <div class="tarja">PROMOÇÃO</div>
  </div>

  <div>
    <div class="texto-topo">{{TEXTO}}</div>

    <div class="valor-container" id="valor-container">
      <div class="valor-texto" id="valor-texto">
        {{VALOR}}
      </div>
    </div>
  </div>

  <div>
    <div class="complemento">{{COMPLEMENTO}}</div>
    <div class="legal">{{LEGAL}}</div>

    <div class="rodape">
      <div>{{URN}}</div>
      <div>{{UF}}</div>

      <div class="segmento-wrapper" id="segmento-bloco">
        NEGOCIO DE CLIENTES: {{SEGMENTO}}
      </div>
    </div>
  </div>

</div>

<script>
(function () {

  const container = document.getElementById("valor-container");
  const el = document.getElementById("valor-texto");

  if (!container || !el) return;

  let fontSize = 480;
  const min = 40;

  el.style.fontSize = fontSize + "px";

  while (
    (el.scrollHeight > container.clientHeight ||
     el.scrollWidth > container.clientWidth) &&
    fontSize > min
  ) {
    fontSize -= 2;
    el.style.fontSize = fontSize + "px";
  }

})();
</script>

</body>
</html>
