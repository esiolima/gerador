
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Cupom de Desconto</title>

<style>
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Regular.ttf') format('truetype');
  font-weight: 400;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Bold.ttf') format('truetype');
  font-weight: 700;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Black.ttf') format('truetype');
  font-weight: 900;
}

* {
  box-sizing: border-box;
  font-family: Inter, sans-serif;
  text-transform: uppercase;
}

body {
  margin: 0;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 700px;
  height: 1057.5px;
  border: 6px solid #F2C94C;
  border-radius: 48px;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px;
  position: relative;
  color: #1F3C6E;
  overflow: hidden;
}

/* ===== SELO ===== */
.selo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 117px;
  height: 58.5px;
  z-index: 99999;
  pointer-events: none;
}

.selo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.selo img[src=""] {
  display: none;
}

/* ===== LOGO ===== */
.logo {
  margin-top: 45px;
  height: 228px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}

.logo img {
  max-height: 228px;
  max-width: 672px;
  object-fit: contain;
}

.logo img[src=""] {
  display: none;
}

.logo:has(img[src=""])::before,
.logo:not(:has(img))::before {
  content: "CLIQUE PARA ADICIONAR LOGO";
  font-size: 18px;
  color: #999;
  border: 2px dashed #ccc;
  padding: 20px 40px;
  border-radius: 12px;
}

/* ===== TEXTO ===== */
.condicao {
  margin-top: 20px;
  margin-bottom: 25px;
  max-width: 550px;
  font-size: 28px;
  line-height: 1.15;
  text-align: center;
}

/* ===== BENEFÍCIO ===== */
.percentual {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  width: 100%;
}

.numero, .percent {
  font-weight: 900;
  font-size: clamp(120px, 25vw, 270px);
}

.percent { margin-left: 6px; }

.desconto {
  margin-top: 5px;
  font-size: clamp(40px, 5vw, 60px);
  font-weight: 700;
}

/* ===== FLEX ===== */
.espaco-flexivel {
  margin-top: 10px;
  margin-bottom: 10px;
}

/* ===== CUPOM BOX ===== */
.cupom-box {
  margin-top: 24px;
  margin-bottom: 15px;
  width: 600px;
  height: 200px;
  min-height: 200px;
  background: #16A7E0;
  border-radius: 20px;
  display: grid;
  grid-template-columns: 95px minmax(0, 1fr);
  overflow: hidden;
  flex-shrink: 0;
}

/* LADO ESQUERDO */
.cupom-label {
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.cupom-label span {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-size: 26px;
  line-height: 1;
  font-weight: 700;
  color: #ffffff;
  white-space: nowrap;
}

/* CÓDIGO */
.cupom-codigo {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 90px 0 30px;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* TEXTO DO CUPOM */
#cupom-text {
  font-weight: 900;
  color: #ffffff;
  font-size: 100px;
  line-height: 1;
  display: inline-block;
  max-width: 100%;
  text-align: center;
  white-space: nowrap;
}

/* ===== RODAPÉ ===== */
.rodape {
  margin-bottom: 30px;
  text-align: center;
  flex-shrink: 0;
}

.uf {
  font-size: 22px;
  font-weight: 700;
}

.segmento {
  margin-top: 12px;
  font-size: 20px;
}
</style>
</head>

<body>
<div class="card">

  <div class="selo">
    <img src="{{SELO}}" alt="Selo">
  </div>

  <div class="logo">
    <img src="{{LOGO}}" alt="Logo">
  </div>

  <div class="condicao">{{TEXTO}}</div>

  <div class="percentual">
    <div class="numero">{{VALOR}}</div>
    <div class="percent">%</div>
  </div>

  <div class="desconto">DE DESCONTO</div>

  <div class="espaco-flexivel">
    <div class="complemento">{{COMPLEMENTO}}</div>
    <div class="legal">{{LEGAL}}</div>
  </div>

  <div class="cupom-box">
    <div class="cupom-label">
      <span>CUPOM</span>
    </div>

    <div class="cupom-codigo">
      <span id="cupom-text">{{CUPOM}}</span>
    </div>
  </div>

  <div class="rodape">
    <div class="uf">{{URN}}</div>
    <div class="uf">{{UF}}</div>
    <div class="segmento" id="segmento-bloco">NEGÓCIO DE CLIENTES: {{SEGMENTO}}</div>
  </div>

</div>

<script>
(function () {

  const el = document.getElementById("cupom-text");
  const container = el ? el.parentElement : null;

  if (el && container) {
    let fontSize = 100;
    const min = 24;

    el.style.whiteSpace = "nowrap";

    const getAvailableWidth = function () {
      const styles = window.getComputedStyle(container);
      const paddingLeft = parseFloat(styles.paddingLeft) || 0;
      const paddingRight = parseFloat(styles.paddingRight) || 0;
      return container.clientWidth - paddingLeft - paddingRight - 60;
    };

    while (el.scrollWidth > getAvailableWidth() && fontSize > min) {
      fontSize--;
      el.style.fontSize = fontSize + "px";
    }
  }

  const segmento = document.getElementById("segmento-bloco");

  if (segmento) {
    const texto = segmento.textContent ? segmento.textContent.trim() : "";

    if (!texto || texto === "NEGÓCIO DE CLIENTES:") {
      segmento.style.display = "none";
    }
  }

})();
</script>

</body>
</html>
